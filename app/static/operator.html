<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portail Opérateur - 5G Core</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8fafc; }
        .sidebar { background: #1e293b; color: white; height: 100vh; padding: 1rem; }
        .nav-link { color: #cbd5e1; }
        .nav-link.active { color: white; font-weight: bold; }
        .logo-container { background: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar text-center">
                <!-- LOGO DYNAMIQUE -->
                <div class="logo-container">
                    <img id="operator-logo" src="" alt="Logo" style="max-width: 100%; height: 50px; object-fit: contain;">
                </div>
                <h4 id="operator-name" class="text-uppercase mb-4" style="font-size: 1.1rem;">Opérateur</h4>
                
                <ul class="nav flex-column text-start">
                    <li class="nav-item"><a class="nav-link active" href="#">🚀 Déploiement</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">🔌 Déconnexion</a></li>
                </ul>
            </nav>
            
            <main class="col-md-10 p-4">
                <h2>Déployer votre réseau 5G Core</h2>
                <div class="card p-4 shadow-sm mb-4 border-0">
                    <form id="deploy-form">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label font-weight-bold">Nom du Site</label>
                                <input type="text" id="site-name" class="form-control" placeholder="ex: Tunis-Centre">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label font-weight-bold">Capacité (Abonnés)</label>
                                <input type="number" id="subscribers" class="form-control" value="1000">
                            </div>
                        </div>
                        <button type="button" onclick="handleDeploy()" class="btn btn-primary px-4">Lancer le déploiement automatique</button>
                    </form>
                </div>

                <h3>État des microservices (<span class="text-primary" id="ns-display"></span>)</h3>
                <table class="table table-hover bg-white rounded shadow-sm overflow-hidden">
                    <thead class="table-dark">
                        <tr><th>NF (Network Function)</th><th>Status</th><th>IP Interface</th></tr>
                    </thead>
                    <tbody id="pods-table">
                        <tr><td colspan="3" class="text-center">Chargement des données...</td></tr>
                    </tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
    // 1. Récupération des infos de session
    const user = localStorage.getItem('username');
    const role = localStorage.getItem('user_role');
    const ns = localStorage.getItem('namespace');
    const logo = localStorage.getItem('user_logo');

    // Sécurité : redirection si non connecté
    if (!user || role !== 'operator') { window.location.href = 'login.html'; }

    // Affichage des infos
    document.getElementById('operator-name').innerText = user;
    document.getElementById('ns-display').innerText = ns;
    // On pointe vers le dossier assets où sont tes images
    document.getElementById('operator-logo').src = "/static/assets/" + logo;

    // 2. Fonction de Déploiement
    async function handleDeploy() {
    const site = document.getElementById('site-name').value || "site-default";
    const subs = document.getElementById('subscribers').value;
    const btn = document.querySelector('button');
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Déploiement...';

    // On prépare un objet complet qui correspond au modèle DeploymentConfig (Python)
    const payload = {
        deployment_name: `${user}-core`.toLowerCase().replace(/\s+/g, '-'), 
        namespace: ns,                   
        operator_name: user,
        num_subscribers: parseInt(subs),
        // On ajoute les valeurs par défaut pour éviter l'erreur 422
        mcc: "208",
        mnc: "93",
        num_upf_replicas: 1,
        num_smf_replicas: 1,
        num_amf_replicas: 1,
        slice_type: "eMBB",
        deployment_mode: "development",
        monitoring_enabled: true,
        expose_webui: true,
        enable_prometheus: true
    };

    try {
        const res = await fetch('/api/core/deploy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        if (res.ok) {
            const result = await res.json();
            alert("✅ Succès : " + result.message);
        } else {
            const errorDetail = await res.json();
            alert("❌ Erreur : " + (errorDetail.detail || "Vérifiez les ressources du cluster"));
        }
    } catch (e) { 
        console.error(e);
        alert("❌ Erreur de connexion au serveur.");
    } finally { 
        btn.disabled = false; 
        btn.innerText = "Lancer le déploiement automatique"; 
    }
}

    // 3. Boucle de rafraîchissement des Pods (Filtré par Namespace)
    async function refreshPods() {
        try {
            const res = await fetch(`/api/status/pods?namespace=${ns}`);
            const data = await res.json();
            const tbody = document.getElementById('pods-table');
            
            if (data.pods.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">Aucun service déployé</td></tr>';
                return;
            }

            tbody.innerHTML = data.pods.map(pod => `
                <tr>
                    <td><strong>${pod.name}</strong></td>
                    <td><span class="badge ${pod.status === 'Running' ? 'bg-success' : 'bg-warning'}">${pod.status}</span></td>
                    <td><code>${pod.ip || 'Provisioning...'}</code></td>
                </tr>
            `).join('');
        } catch (e) { console.error("Erreur pods:", e); }
    }

    setInterval(refreshPods, 3000); 
    refreshPods();

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
