<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portail Opérateur - 5G Core</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8fafc; }
        .sidebar { background: #1e293b; color: white; height: 100vh; padding: 1rem; }
        .nav-link { color: #cbd5e1; }
        .nav-link.active { color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar">
                <h4 id="operator-name" class="text-uppercase mb-4">Opérateur</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link active" href="#">Déploiement</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Déconnexion</a></li>
                </ul>
            </nav>
            <main class="col-md-10 p-4">
                <h2>Déployer votre réseau 5G Core</h2>
                <div class="card p-4 shadow-sm mb-4">
                    <form id="deploy-form">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Nom du Site</label>
                                <input type="text" id="site-name" class="form-control" placeholder="ex: Tunis-Centre">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Capacité (Nombre d'abonnés)</label>
                                <input type="number" id="subscribers" class="form-control" value="1000">
                            </div>
                        </div>
                        <button type="button" onclick="handleDeploy()" class="btn btn-primary">Lancer le déploiement automatique</button>
                    </form>
                </div>

                <h3>État de vos microservices (Namespace: <span id="ns-display"></span>)</h3>
                <table class="table table-hover bg-white rounded shadow-sm">
                    <thead class="table-dark">
                        <tr><th>Pod Name</th><th>Status</th><th>IP</th></tr>
                    </thead>
                    <tbody id="pods-table">
                        <!-- Rempli par le JS -->
                    </tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('user_role');
        const ns = localStorage.getItem('namespace');
        document.getElementById('operator-name').innerText = user;
        document.getElementById('ns-display').innerText = ns;

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        async function handleDeploy() {
            const site = document.getElementById('site-name').value;

            // Ici ton appel fetch('/api/core/deploy') avec le namespace
        }
        // Ajouter ici une fonction setInterval pour récupérer les pods via /api/status/pods?namespace=...
    </script>
</body>
</html>
