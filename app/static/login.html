<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - 5G Core Orchestrator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #1e293b; padding: 2.5rem; border-radius: 1rem; width: 400px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn-primary { background: #2563eb; border: none; }
        .btn-primary:hover { background: #1d4ed8; }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; }
        .form-control:focus { background: #0f172a; color: white; border-color: #2563eb; box-shadow: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center mb-2">🚀 5G Orchestrator</h2>
        <p class="text-center text-secondary mb-4">Connectez-vous à la plateforme</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" id="username" class="form-control" placeholder="ex: orange" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Se connecter</button>
            </div>
        </form>
        <div id="errorMsg" class="text-danger mt-3 text-center" style="display:none;"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Stockage des informations de session
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('namespace', data.namespace);

                    // Redirection intelligente
                    if (data.role === 'admin') {
                        window.location.href = '/static/admin.html';
                    } else {
                        window.location.href = '/static/operator.html';
                    }
                } else {
                    const errorData = await response.json();
                    errorMsg.innerText = errorData.detail || "Échec de la connexion";
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = "Erreur de connexion au serveur";
                errorMsg.style.display = 'block';
                console.error("Erreur:", error);
            }
        });
    </script>
</body>
</html>
