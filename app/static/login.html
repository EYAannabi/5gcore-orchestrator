<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - 5G Core Orchestrator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #1e293b; padding: 2rem; border-radius: 1rem; width: 400px; border: 1px solid #334155; }
        .btn-huawei { background: #d71920; color: white; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="mb-4">🚀 5G Orchestrator</h2>
        <p class="text-secondary">Sélectionnez votre profil</p>
        <div class="d-grid gap-3">
            <button onclick="login('orange')" class="btn btn-outline-warning btn-lg">Orange Operator</button>
            <button onclick="login('ooredoo')" class="btn btn-outline-danger btn-lg">Ooredoo Operator</button>
            <hr class="border-secondary">
            <button onclick="login('huawei')" class="btn btn-huawei btn-lg">Huawei Admin (Supervision)</button>
        </div>
    </div>

    <!-- Dans la balise <script> de login.html -->
<script>
    async function login(username, password) {
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                
                // Sauvegarder les infos dans le navigateur
                localStorage.setItem('user_role', data.role);
                localStorage.setItem('username', data.username);
                localStorage.setItem('namespace', data.namespace);

                // Redirection selon le rôle
                if (data.role === 'admin') {
                    window.location.href = '/static/admin.html';
                } else {
                    window.location.href = '/static/operator.html';
                }
            } else {
                alert("Identifiants incorrects");
            }
        } catch (error) {
            console.error("Erreur login:", error);
        }
    }

    // Exemple : appeler login('orange', 'orange123') quand on clique sur le bouton
</script>
</body>
</html>
