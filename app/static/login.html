<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - 5G Core Orchestrator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-card { background: #1e293b; padding: 2.5rem; border-radius: 1rem; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; padding: 0.75rem; }
        .form-control:focus { background: #0f172a; color: white; border-color: #3b82f6; box-shadow: none; }
        .btn-primary { background: #3b82f6; border: none; padding: 0.75rem; font-weight: bold; }
        .btn-primary:hover { background: #2563eb; }
        .logo { font-size: 2rem; margin-bottom: 1.5rem; display: block; text-align: center; }
    </style>
</head>
<body>

<div class="login-card">
    <span class="logo">🚀 5G Core</span>
    <h4 class="text-center mb-4">Connexion Plateforme</h4>
    
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label text-secondary">Nom d'utilisateur</label>
            <input type="text" id="username" class="form-control" placeholder="ex: orange" required>
        </div>
        <div class="mb-4">
            <label class="form-label text-secondary">Mot de passe</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
    </form>
    
    <div id="errorMessage" class="mt-3 text-danger text-center" style="display: none; font-size: 0.9rem;">
        ❌ Identifiants incorrects
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        
        errorDiv.style.display = 'none';

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                
                // Sauvegarde de la session
                localStorage.setItem('user_role', data.role);
                localStorage.setItem('username', data.username);
                localStorage.setItem('namespace', data.namespace);
                localStorage.setItem('user_logo', data.logo); 
                // Redirection selon le rôle
                if (data.role === 'admin') {
                    window.location.href = '/static/admin.html';
                } else {
                    window.location.href = '/static/operator.html';
                }
            } else {
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            console.error("Erreur:", err);
            alert("Erreur de connexion au serveur");
        }
    });
</script>

</body>
</html>
