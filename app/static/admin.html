<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huawei Admin - Supervision Globale 5G</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .topbar { background: #d71920; padding: 12px 25px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; position: relative; }
        .dashboard-container { padding: 25px; }
        .card-stat { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; transition: all 0.3s ease; height: 100%; }
        .card-stat:hover { border-color: #d71920; transform: translateY(-2px); }
        .stat-label { color: #94a3b8; font-size: 0.85rem; text-uppercase: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-value { font-size: 2rem; font-weight: 700; margin: 0; }
        .text-huawei { color: #d71920; }
        
        /* Iframe Styling */
        .grafana-container { background: #1e293b; border: 2px solid #334155; border-radius: 15px; overflow: hidden; margin-top: 25px; position: relative; }
        iframe { width: 100%; min-height: 700px; border: none; }
        
        .badge-status { font-size: 0.9rem; padding: 8px 12px; border-radius: 20px; }
        .ns-tag { background: rgba(215, 25, 32, 0.1); border: 1px solid rgba(215, 25, 32, 0.3); color: #f87171; padding: 2px 10px; border-radius: 5px; margin-right: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- Barre supérieure -->
    <div class="topbar d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <span class="fs-4 me-3">🚀</span>
            <div>
                <div style="line-height: 1.2;">HUAWEI 5G ORCHESTRATOR</div>
                <small style="font-size: 0.7rem; opacity: 0.8;">SUPERVISION GLOBALE MULTI-OPÉRATEUR</small>
            </div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span id="admin-name" class="badge bg-dark">Admin</span>
            <button onclick="logout()" class="btn btn-sm btn-outline-light px-3">Déconnexion</button>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="row g-4 mb-2">
            <!-- Statistique : Opérateurs -->
            <div class="col-md-3">
                <div class="card-stat">
                    <div class="stat-label">Opérateurs Actifs</div>
                    <h2 class="stat-value text-huawei" id="total-ns">0</h2>
                </div>
            </div>

            <!-- Statistique : Cluster -->
            <div class="col-md-3">
                <div class="card-stat">
                    <div class="stat-label">État du Cluster K3s</div>
                    <h2 class="stat-value text-success" id="cluster-status">Connecté</h2>
                </div>
            </div>

            <!-- Statistique : Liste des Namespaces -->
            <div class="col-md-6">
                <div class="card-stat">
                    <div class="stat-label">Réseaux Détectés (Namespaces -5g)</div>
                    <div id="ns-list" class="mt-2 d-flex flex-wrap gap-2">
                        <span class="text-muted italic">Analyse du cluster en cours...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section Grafana -->
        <div class="d-flex justify-content-between align-items-center mt-4">
            <h4 class="m-0">Supervision Temps Réel (Prometheus / Grafana)</h4>
            <div class="d-flex align-items-center gap-2">
                <span class="spinner-grow spinner-grow-sm text-huawei"></span>
                <span class="text-secondary" style="font-size: 0.8rem;">Live Data</span>
            </div>
        </div>
        
        <div class="grafana-container shadow-lg">
            <!-- NOTE : Remplace 192.168.140.128 par l'IP de ta VM si elle change -->
            <iframe id="grafana-frame" src="http://192.168.140.128:3000/d/free5gc-dashboard?orgId=1&refresh=5s&kiosk"></iframe>
        </div>
    </div>

    <script>
        // 1. Vérification de sécurité au chargement
        const role = localStorage.getItem('user_role');
        const username = localStorage.getItem('username');

        if (!username || role !== 'admin') {
            console.error("Accès refusé : Rôle admin requis.");
            window.location.href = 'login.html';
        }

        document.getElementById('admin-name').innerText = "Identifié : " + username;

        // 2. Fonction pour récupérer les statistiques réelles depuis l'API
        async function refreshStats() {
            try {
                // Cette route doit exister dans app/routes/pods.py (@router.get("/stats/global"))
                const res = await fetch('/api/status/stats/global');
                if (!res.ok) throw new Error("Erreur API Stats");
                
                const data = await res.json();
                
                // Mise à jour du compteur
                document.getElementById('total-ns').innerText = data.total_operators;

                // Mise à jour de la liste visuelle des namespaces
                const listContainer = document.getElementById('ns-list');
                if (data.namespaces && data.namespaces.length > 0) {
                    listContainer.innerHTML = data.namespaces
                        .map(ns => `<span class="ns-tag">${ns}</span>`)
                        .join('');
                } else {
                    listContainer.innerHTML = '<span class="text-muted italic">Aucun réseau opérateur déployé.</span>';
                }

                // Vérification santé cluster
                document.getElementById('cluster-status').innerText = "Healthy";
                document.getElementById('cluster-status').className = "stat-value text-success";

            } catch (e) {
                console.error("Erreur refreshStats:", e);
                document.getElementById('cluster-status').innerText = "Erreur API";
                document.getElementById('cluster-status').className = "stat-value text-danger";
            }
        }

        // 3. Boucle de mise à jour automatique (toutes les 5 secondes)
        setInterval(refreshStats, 5000);
        refreshStats(); // Appel initial immédiat

        // 4. Fonction de déconnexion
        function logout() { 
            localStorage.clear(); 
            window.location.href = 'login.html'; 
        }
    </script>
</body>
</html>
