<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HUAWEI 5G - Infrastructure Monitoring</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .topbar { background: #d71921; padding: 15px; font-weight: bold; border-bottom: 4px solid #a01419; }
        .sidebar { background: #161b22; min-height: 100vh; border-right: 1px solid #30363d; }
        .card-custom { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 20px; height: 100%; }
        .stat-value { font-size: 2.5rem; font-weight: 800; color: #f85149; }
        .stat-label { color: #8b949e; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .table-dark-custom { background: #1c2128; color: white; border-radius: 8px; overflow: hidden; }
        .status-running { color: #3fb950; font-weight: bold; }
        .status-pending { color: #d29922; font-weight: bold; }
        .status-critical { color: #f85149; font-weight: bold; }
        canvas { max-height: 200px; }
    </style>
</head>
<body>

<div class="topbar d-flex justify-content-between align-items-center shadow">
    <span>🛰️ HUAWEI 5G CORE ORCHESTRATOR - INFRASTRUCTURE ADMIN</span>
    <div>
        <span class="badge bg-dark border border-secondary me-3">K3S CLUSTER: READY</span>
        <button onclick="logout()" class="btn btn-sm btn-outline-light">Déconnexion</button>
    </div>
</div>

<div class="container-fluid">
    <div class="row mt-4">
        <!-- Cartes Statistiques -->
        <div class="col-md-2">
            <div class="card-custom">
                <div class="stat-label">Opérateurs</div>
                <div class="stat-value" id="count-operators">0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card-custom text-center">
                <div class="stat-label">Nodes Ready</div>
                <div class="stat-value text-success" id="count-nodes">0/0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card-custom text-center">
                <div class="stat-label">Pods Running</div>
                <div class="stat-value text-info" id="count-pods-running">0</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card-custom text-center">
                <div class="stat-label">Pods Pending</div>
                <div class="stat-value text-warning" id="count-pods-pending">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-custom">
                <div class="stat-label">Santé du Cluster</div>
                <div class="stat-value" id="cluster-health">...</div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <!-- Tableau des Opérateurs -->
        <div class="col-md-8">
            <div class="card-custom">
                <h5 class="mb-4 text-primary">Gestion des Réseaux Opérateurs</h5>
                <table class="table table-dark table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Opérateur</th>
                            <th>Namespace</th>
                            <th>Pods</th>
                            <th>État</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="operators-table-body">
                        <!-- Rempli par JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Graphiques rapides -->
        <div class="col-md-4">
            <div class="card-custom">
                <h5 class="mb-3">Distribution des Pods</h5>
                <canvas id="podsChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Iframe Grafana -->
    <div class="row mt-4 mb-5">
        <div class="col-12">
            <div class="card-custom p-0">
                <div class="p-3 border-bottom border-secondary d-flex justify-content-between">
                    <h5>Supervision Temps Réel (Prometheus / Grafana)</h5>
                    <button onclick="refreshGrafana()" class="btn btn-xs btn-outline-primary">Rafraîchir Frame</button>
                </div>
                <iframe id="grafana-frame" src="" width="100%" height="600" style="border:none;"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Configuration dynamique de l'URL Grafana
    const host = window.location.hostname;
    // Ton UID exact récupéré depuis Grafana
    const dashboardUID = "85a562078cdf77779eaa1add43ccec1e";
    
    // URL formatée pour l'intégration (Mode Kiosk pour cacher les menus)
    const grafanaUrl = `http://${host}:30000/d/${dashboardUID}/kubernetes-compute-resources-namespace-pods?orgId=1&refresh=10s&kiosk`;
    
    document.getElementById('grafana-frame').src = grafanaUrl;

    let podsChart;

    async function fetchData() {
        try {
            // 1. Overview - Stats globales du cluster
            const resOverview = await fetch('/api/admin/overview');
            const data = await resOverview.json();
            
            document.getElementById('count-operators').innerText = data.total_operators;
            document.getElementById('count-nodes').innerText = data.nodes_ready;
            document.getElementById('count-pods-running').innerText = data.pods_running;
            document.getElementById('count-pods-pending').innerText = data.pods_pending;
            
            const healthEl = document.getElementById('cluster-health');
            healthEl.innerText = data.cluster_status;
            healthEl.className = `stat-value ${data.cluster_status === 'Healthy' ? 'text-success' : 'text-warning'}`;

            // Mise à jour du graphique circulaire (Doughnut)
            updateChart(data.pods_running, data.pods_pending, data.pods_failed || 0);

            // 2. Operators Table - Liste des réseaux déployés
            const resOps = await fetch('/api/admin/operators');
            const ops = await resOps.json();
            const tbody = document.getElementById('operators-table-body');
            
            tbody.innerHTML = ops.map(op => `
                <tr>
                    <td><img src="/static/assets/default.png" style="width:20px; margin-right:8px;"> <strong>${op.name}</strong></td>
                    <td><code>${op.namespace}</code></td>
                    <td><span class="badge bg-secondary">${op.running_count} / ${op.pod_count} Pods</span></td>
                    <td><span class="${op.status === 'Running' ? 'status-running' : 'status-pending'}">● ${op.status}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-info" onclick="window.open('${op.webui_url}')">Accès WebUI</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteNetwork('${op.name}', '${op.namespace}')">Supprimer</button>
                    </td>
                </tr>
            `).join('');

        } catch (e) { console.error("Erreur de rafraîchissement des données Admin:", e); }
    }

    function updateChart(running, pending, failed) {
        const ctx = document.getElementById('podsChart').getContext('2d');
        if (podsChart) { podsChart.destroy(); }
        podsChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Running', 'Pending', 'Failed'],
                datasets: [{
                    data: [running, pending, failed],
                    backgroundColor: ['#3fb950', '#d29922', '#f85149'],
                    hoverOffset: 4,
                    borderWidth: 0
                }]
            },
            options: { 
                cutout: '70%',
                plugins: { legend: { position: 'bottom', labels: { color: '#8b949e' } } } 
            }
        });
    }

    async function deleteNetwork(name, ns) {
        if (confirm(`⚠️ ATTENTION : Voulez-vous vraiment supprimer le réseau de ${name} ?`)) {
            try {
                const res = await fetch(`/api/core/clean?deployment_name=${name.toLowerCase()}-core&namespace=${ns}`, { method: 'DELETE' });
                if (res.ok) {
                    alert("Réseau supprimé avec succès.");
                    fetchData();
                }
            } catch (e) { alert("Erreur lors de la suppression."); }
        }
    }

    function refreshGrafana() {
        const frame = document.getElementById('grafana-frame');
        frame.src = frame.src; // Force le rechargement de l'iframe
    }

    function logout() { 
        localStorage.clear(); 
        window.location.href = 'login.html'; 
    }

    // Intervalle de mise à jour (5 secondes)
    setInterval(fetchData, 5000);
    fetchData(); // Premier appel au chargement
</script>
</body>
</html>
