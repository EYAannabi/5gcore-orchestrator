<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Huawei Admin - Supervision Globale</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f172a; color: white; }
        .topbar { background: #d71920; padding: 10px 20px; font-weight: bold; }
        .dashboard-container { padding: 20px; }
        iframe { border: 1px solid #334155; border-radius: 8px; background: #1e293b; }
    </style>
</head>
<body>
    <div class="topbar d-flex justify-content-between">
        <span>HUAWEI ADMIN - 5G CORE MONITORING</span>
        <button onclick="logout()" class="btn btn-sm btn-light">Déconnexion</button>
    </div>

    <div class="dashboard-container">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card bg-dark text-white border-secondary p-3">
                    <h6>Total Namespaces</h6>
                    <h2 class="text-danger">3</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-dark text-white border-secondary p-3">
                    <h6>K3s Node Status</h6>
                    <h2 class="text-success">Healthy</h2>
                </div>
            </div>
        </div>

        <h4>Supervision en temps réel (Prometheus / Grafana)</h4>
        <div class="ratio ratio-16x9">
            <!-- Remplacer l'URL par celle de ton Grafana local -->
            <iframe src="http://192.168.x.x:3000/d/free5gc-dashboard?orgId=1&refresh=5s&kiosk" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
